- name: Ensure packages for Kubernetes are present
  ansible.builtin.apt:
    pkg:
    - apt-transport-https
    - ca-certificates
    - curl
    - gpg

- name: Check if kubernetes apt keyring file exists
  stat:
    path: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  register: kubernetesaptkeyring_check

- block:
  - name: Check if kubernetes apt keyring file exists
    stat:
      path: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    register: kubernetesaptkeyring_check

  - name: Rawly install the official Kubernetes repository keyring
    raw: curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.34/deb/Release.key | sudo gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg

  - name: Rawly write the sources
    raw: echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.34/deb/ /' | sudo tee /etc/apt/sources.list.d/kubernetes.list

  when: not kubernetesaptkeyring_check.stat.exists

